name: customer_app
description: "Customer mobile app for gas ordering and live delivery tracking in Oman."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_riverpod: ^3.0.3
  go_router: ^16.3.0
  flutter_map: ^8.2.2
  google_fonts: ^6.3.2
  intl: ^0.20.2
  latlong2: ^0.9.1
  shared_preferences: ^2.5.3
  socket_io_client: ^3.1.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  device_info_plus: ^12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
